arazzo: "1.1.0"
info:
  title: Querystring Runtime Expression Test
  version: 1.0.0
sourceDescriptions:
  - name: api
    url: https://api.example.com/openapi.yaml
    type: openapi
workflows:
  - workflowId: testQuerystringExpr
    inputs:
      type: object
      properties:
        filter:
          type: string
    steps:
      - stepId: search
        operationId: $sourceDescriptions.api.searchItems
        parameters:
          - name: q
            in: querystring
            value: "filter={$inputs.filter}&limit=20"