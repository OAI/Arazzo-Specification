arazzo: 1.1.0
info:
  title: Async dependsOn should contain unique values
  version: 1.0.0
sourceDescriptions:
  - name: eventAPI
    url: https://events.com/asyncapi.yaml
    type: asyncapi
workflows:
  - workflowId: asyncWorkflow
    steps:
      - stepId: sendEvent
        operationId: $sourceDescriptions.eventAPI.orderCreated
        action: send
      - stepId: receiveEvent
        operationId: $sourceDescriptions.eventAPI.orderCreated
        action: receive
        dependsOn:
          - sendEvent
          - sendEvent
