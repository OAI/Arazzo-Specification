arazzo: 1.1.0
info:
  title: Workflow step parameters must be unique
  version: 1.0.0
sourceDescriptions:
  - name: userAPI
    url: https://users.com/openapi.yaml
    type: openapi
workflows:
  - workflowId: parentWorkflow
    steps:
      - stepId: nestedWorkflow
        workflowId: childWorkflow
        parameters:
          - name: userId
            value: 10
          - name: userId
            value: 10
  - workflowId: childWorkflow
    inputs:
      type: object
      properties:
        userId:
          type: integer
    steps:
      - stepId: childStep
        operationId: $sourceDescriptions.userAPI.listUsers
