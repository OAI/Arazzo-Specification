arazzo: 1.1.0
info:
  title: OpenAPI step parameter requires in
  version: 1.0.0
sourceDescriptions:
  - name: userAPI
    url: https://users.com/openapi.yaml
    type: openapi
workflows:
  - workflowId: openapiWorkflow
    steps:
      - stepId: getUsers
        operationId: $sourceDescriptions.userAPI.listUsers
        parameters:
          - name: limit
            value: 10
        successCriteria:
          - condition: $statusCode == 200
